<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - ページが見つかりません | dim7.jp</title>
    <meta name="description" content="お探しのページは見つかりませんでした。dim7.jpのトップページからコンテンツをご覧ください。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Meiryo', sans-serif;
            min-height: 100vh;
        }
        body {
            background: radial-gradient(circle at 0% 0%, #3a7bd5, #004e92);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        .error-code {
            font-size: 5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
            opacity: 0.9;
        }
        .error-icon { font-size: 3rem; margin: 10px 0; }
        h1 { font-size: 1.6em; margin: 10px 0 20px; }
        p { line-height: 1.8; opacity: 0.9; margin: 10px 0; }
        .content-links {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .content-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: background 0.2s ease;
            text-align: left;
        }
        .content-link:hover { background: rgba(255, 255, 255, 0.2); }
        .content-link .link-icon { font-size: 1.5rem; flex-shrink: 0; }
        .content-link .link-title { font-weight: bold; }
        .content-link .link-desc { font-size: 0.85em; opacity: 0.8; margin-top: 2px; }
        .home-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .home-link:hover { background: rgba(255,255,255,0.3); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .error-code { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="error-code">404</p>
        <div class="error-icon">🎵</div>
        <h1>ページが見つかりません</h1>
        <p>お探しのページは存在しないか、移動・削除された可能性があります。</p>
        <p>以下のコンテンツをお試しください。</p>

        <div class="content-links">
            <a href="https://dim7.jp/clock/" class="content-link" rel="noopener">
                <span class="link-icon">🕐</span>
                <div>
                    <div class="link-title">Clock Harmonizer</div>
                    <div class="link-desc">アナログ時計の針が奏でるリアルタイムハーモニー</div>
                </div>
            </a>
            <a href="https://dim7.jp/Digital/" class="content-link" rel="noopener">
                <span class="link-icon">🎹</span>
                <div>
                    <div class="link-title">Digital Clock Synthesizer</div>
                    <div class="link-desc">時刻がそのまま音の比率になるシンセサイザー</div>
                </div>
            </a>
            <a href="https://dim7.jp/c5vis/" class="content-link" rel="noopener">
                <span class="link-icon">🎼</span>
                <div>
                    <div class="link-title">Circle of Fifths Visualizer</div>
                    <div class="link-desc">音楽ファイルをアップロードして五度圏を可視化</div>
                </div>
            </a>
        </div>

        <a href="/" class="home-link">← ホームに戻る</a>
    </div>
</body>
</html>
